<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hkn Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container" class="hidden">
        <div class="glass-box">
            <div class="title-area">
                <h1 id="loc-title">Konum Başlığı</h1>
                <div class="pink-line"></div>
            </div>
            
            <p id="loc-desc" class="description">
                Konum açıklaması buraya gelecek.
            </p>

            <div id="page-count" class="page-counter">1 / 3</div>

            <div class="button-row">
                <button id="btn-back" class="dark-bg tab-btn">Back</button>
                <button id="btn-next" class="pink-bg tab-btn">Next</button>
                <button id="btn-finish" class="pink-bg tab-btn" style="display:none;">Bitir</button>
            </div>
            
            <button id="btn-skip" class="dark-bg tab-btn skip-btn">Skip</button>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
